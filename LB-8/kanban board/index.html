<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="board">

  <div class="column">
    <h2 class="todo">To Do</h2>
    <div class="list" data-column="todo">
      <div class="card" draggable="true">Task 1</div>
      <div class="card" draggable="true">Task 2</div>
      <div class="card" draggable="true">Task 3</div>
    </div>
  </div>

  <div class="column">
    <h2 class="working">Working</h2>
    <div class="list" data-column="working">
      <div class="card" draggable="true">Task 4</div>
      <div class="card" draggable="true">Task 5</div>
    </div>
  </div>

  <div class="column">
    <h2 class="done">Done</h2>
    <div class="list" data-column="done">
      <div class="card" draggable="true">Task 6</div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
