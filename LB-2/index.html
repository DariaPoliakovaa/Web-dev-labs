<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>ЛБ №2</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<h1>ЛР2</h1>
<div class="section">
<h3>1. Мінімальне та максимальне число</h3>
<input id="numbers" placeholder="Введіть числа через кому">
<br>
<button class="button" onclick="findMinMax()">Знайти</button>
<div class="result" id="minmaxResult"></div>
</div>

<div class="section">
<h3>2. Перевірка числа в діапазоні</h3>
<input id="number" placeholder="Число">
<input id="min" placeholder="Мін">
<input id="max" placeholder="Макс">
<br>
<button class="button" onclick="checkRange()">Перевірити</button>
<div class="result" id="rangeResult"></div>
</div>

<div class="section">
<h3>3. Оцінка студента</h3>
<input id="score" placeholder="Введіть бал">
<br>
<button class="button" onclick="gradeIf()">Через if</button>
<button class="button" onclick="gradeTernary()">Через ?</button>
<div class="result" id="gradeResult"></div>
</div>

<div class="section">
<h3>4. Сезон за місяцем</h3>
<input id="month" placeholder="Місяць (1-12)">
<br>
<button class="button" onclick="getSeason()">Визначити</button>
<div class="result" id="seasonResult"></div>
</div>
<script src="script.js"></script>
</body>
</html>
