<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Forms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('signup')">Signup</button>
        <button class="tab-btn" onclick="switchTab('login')">Login</button>
    </div>

    <!-- ФОРМА РЕЄСТРАЦІЇ -->
    <form id="signupForm" class="form-content active" novalidate>
        <h2>Create an account</h2>
        
        <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="Enter first name">
            <span class="error-msg" id="firstNameError"></span>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="Enter last name">
            <span class="error-msg" id="lastNameError"></span>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="Enter email">
            <span class="error-msg" id="signupEmailError"></span>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="signupPassword" placeholder="Enter password">
                <span class="toggle-password" onclick="togglePassword('signupPassword')">👁️</span>
            </div>
            <span class="error-msg" id="signupPasswordError"></span>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="Confirm password">
                <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
            </div>
            <span class="error-msg" id="confirmPasswordError"></span>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone" placeholder="+380XXXXXXXXX">
            <span class="error-msg" id="phoneError"></span>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob">
            <span class="error-msg" id="dobError"></span>
        </div>

        <div class="form-group">
            <label>Sex</label>
            <select id="sex">
                <option value="">Choose...</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <span class="error-msg" id="sexError"></span>
        </div>

        <div class="form-group">
            <label>Country</label>
            <select id="country" onchange="populateCities()">
                <option value="">Choose country...</option>
                <option value="ukraine">Ukraine</option>
                <option value="usa">USA</option>
            </select>
            <span class="error-msg" id="countryError"></span>
        </div>

        <div class="form-group">
            <label>City</label>
            <select id="city" disabled>
                <option value="">Choose city...</option>
            </select>
            <span class="error-msg" id="cityError"></span>
        </div>

        <button type="submit" class="submit-btn">Signup</button>
        <div id="signupSuccess" class="success-msg-main"></div>
    </form>

    <!-- ФОРМА АВТОРИЗАЦІЇ -->
    <form id="loginForm" class="form-content" novalidate>
        <h2>Login here</h2>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username">
            <span class="error-msg" id="loginUsernameError"></span>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="loginPassword" placeholder="Enter password">
                <span class="toggle-password" onclick="togglePassword('loginPassword')">👁️</span>
            </div>
            <span class="error-msg" id="loginPasswordError"></span>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember Me</label>
        </div>

        <button type="submit" class="submit-btn">Login</button>
        <div id="loginSuccess" class="success-msg-main"></div>
    </form>

</div>

<script src="script.js"></script>
</body>
</html>
