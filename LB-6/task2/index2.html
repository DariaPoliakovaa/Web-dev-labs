<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List</title>
<link rel="stylesheet" href="style2.css">
</head>

<body>

<header>
<h1>Список завдань</h1>
</header>

<main>

<form id="taskForm">
<input 
type="text" 
id="taskInput" 
placeholder="Введіть нове завдання..." 
required
minlength="2"
/>

<button type="submit">Додати</button>
</form>

<section class="sorting">
<button id="sortCreated">Сортувати за датою створення</button>
<button id="sortUpdated">Сортувати за датою оновлення</button>
<button id="sortStatus">Сортувати за статусом</button>
<button id="resetSort">Скинути</button>
</section>

<ul id="taskList"></ul>

</main>

<script src="script2.js"></script>

</body>
</html>
